replicaCount: 2

nameOverride: ""
fullnameOverride: ""

# Name of a pre-created Kubernetes Secret holding the app's runtime secrets
# (DATABASE_URL, REDIS_URL, JWT_SECRET_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET).
# Created out-of-band, e.g. `kubectl create secret generic hiver-secrets --from-env-file=.env`.
secretName: hiver-secrets

image:
  repository: hiver/backend
  tag: latest
  pullPolicy: IfNotPresent

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  annotations: {}
  hosts: []

env:
  APP_ENV: production
  APP_PORT: "8000"
  LOG_LEVEL: INFO
